<li class="review swiper-slide">
    <div class="review__header text-xs">
        <div class="review__author">@@author</div>
        <div class="review__time">@@time</div>
    </div>
    <div class="review__image">
        <img src="@@image" class="cover-image" alt="@@alt">
    </div>
    <blockquote class="review__text text-s">@@text</blockquote>
</li>
