<div class="programm__card swiper-slide">
    <div class="programm__card-info">
        <div class="programm__card-day h3">День @@index</div>
        <div class="programm__card-caption h3">@@caption</div>
        <div class="programm__card-text text-m">
            @@for (var i = 0; i < text.length; i++) { <p> `+text[i]+`</p>}
        </div>
    </div>
    <div class="programm__card-image">
        <img src="@@imageURL" class="cover-image" alt="@@imageAlt">
    </div>
</div>
